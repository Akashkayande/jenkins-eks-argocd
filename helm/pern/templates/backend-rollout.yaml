apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}
          resources:
            requests:
              cpu: {{ .Values.backend.resources.stable.requests.cpu }}
              memory: {{ .Values.backend.resources.stable.requests.memory }}
            limits:
              cpu: {{ .Values.backend.resources.stable.limits.cpu }}
              memory: {{ .Values.backend.resources.stable.limits.memory }}
          envFrom:
            - secretRef:
                name: backend-secrets
  strategy:
    canary:
      canaryService: backend-canary-service
      stableService: backend-service
      trafficRouting:
        nginx:
          stableIngress: pern-ingress

      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: backend-auto-rollback

        - setWeight: 50
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: backend-auto-rollback

        - setWeight: 80
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: backend-auto-rollback

        - setWeight: 100
        - analysis:
            templates:
              - templateName: backend-auto-rollback

