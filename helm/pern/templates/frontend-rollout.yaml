apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          resources:
            requests:
              cpu: {{ .Values.frontend.resources.stable.requests.cpu }}
              memory: {{ .Values.frontend.resources.stable.requests.memory }}
            limits:
              cpu: {{ .Values.frontend.resources.stable.limits.cpu }}
              memory: {{ .Values.frontend.resources.stable.limits.memory }}
  strategy:
    canary:
      canaryService: frontend-canary-service
      stableService: frontend-service
      trafficRouting:
        nginx:
          stableIngress: pern-ingress

      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: frontend-auto-rollback

        - setWeight: 50
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: frontend-auto-rollback

        - setWeight: 80
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: frontend-auto-rollback

        - setWeight: 100
        - analysis:
            templates:
              - templateName: frontend-auto-rollback


