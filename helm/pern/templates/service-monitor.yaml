apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus   
spec:
  selector:
    matchLabels:
      app: backend

  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}

  endpoints:
    - port: http
      path: /metrics
      interval: 30s